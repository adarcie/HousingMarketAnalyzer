name: Refresh data (rates + deals)

on:
  workflow_dispatch:
  schedule:
    # Runs in UTC. Adjust anytime you like.
    - cron: "10 16 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update data
        run: node scripts/update_data.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh data"
            git push
          fi
